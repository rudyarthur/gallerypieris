<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Country Gallery</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    font-family: system-ui, sans-serif;
    background: #fafafa;
  }
  select {
    font-size: 1rem;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    border: 1px solid #ccc;
  }
  img {
    max-width: 90vw;
    max-height: 80vh;
  }
</style>
</head>
<body>

<select id="country" onchange="document.getElementById('pic').src = 'images/' + this.value + '.png'">
  <option value="Denmark">Denmark</option>
  <option value="Sweden">Sweden</option>
  <option value="Norway">Norway</option>
</select>

<img id="pic" src="images/Denmark.png" alt="Denmark">

</body>
</html>
